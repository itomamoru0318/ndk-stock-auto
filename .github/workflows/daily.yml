
name: Daily NDK Stock Auto

on:
  schedule:
    # JST 08:30 = UTC 23:30
    - cron: '30 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 履歴をすべて取得（重要）

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ★ ここで先に最新の main を取り込む
      - name: Sync with remote
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run stock fetch script
        run: python fetch_stock.py

      - name: Commit CSV
        run: |
          git add ndk_stock.csv
          git commit -m "Update stock CSV" || echo "No changes to commit"
          git push
